services:
  - type: web
    name: cs-course-atlas-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://eddyarriaga00.github.io
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: OAUTH_POST_LOGIN_FALLBACK_PATH
        value: https://eddyarriaga00.github.io/CS-Course-Atlas/index.html
      - key: GOOGLE_OAUTH_CLIENT_ID
        value: __disabled__
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        value: __disabled__
      - key: GITHUB_OAUTH_CLIENT_ID
        value: __disabled__
      - key: GITHUB_OAUTH_CLIENT_SECRET
        value: __disabled__
